name: lcls2-ci
on:
  push:
    branches:
      - ci-debug
jobs:
  run-tests-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: scr.svc.stanford.edu/slaclcls/lcls2_docker/lcls2:centos7-py3.9
      env:
        CONDA_ENV: myrel
        TRAVIS_OS_NAME: linux
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: tests on centos7
        run: bash -l ./run_travis.sh "$TRAVIS_OS_NAME"
